# Loki 配置
# 单节点部署，适用于开发/测试环境

auth_enabled: false

server:
  http_listen_port: 3100

common:
  path_prefix: /loki
  storage:
    filesystem:
      chunks_directory: /loki/chunks
      rules_directory: /loki/rules
  replication_factor: 1
  ring:
    kvstore:
      store: inmemory

limits_config:
  # 允许 OTel Collector 推送结构化元数据
  allow_structured_metadata: true
  volume_enabled: true
  retention_period: 168h            # 日志保留 7 天

schema_config:
  configs:
    - from: "2024-01-01"
      store: tsdb
      object_store: filesystem
      schema: v13
      index:
        prefix: index_
        period: 24h

storage_config:
  filesystem:
    directory: /loki/storage

compactor:
  working_directory: /loki/compactor
  retention_enabled: true
  delete_request_store: filesystem
