# Prometheus configuration file
global:
  scrape_interval: 15s      # 每15秒拉取一次指标
  evaluation_interval: 15s  # 每15秒评估一次规则
  external_labels:
    cluster: 'yuanrong-frontend'
    environment: 'development'

# Alertmanager configuration (可选)
# alerting:
#   alertmanagers:
#     - static_configs:
#         - targets:
#           - alertmanager:9093

# 规则文件路径 (可选)
# rule_files:
#   - "alert_rules.yml"

# 抓取配置
scrape_configs:
  # 抓取 Prometheus 自身指标
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
        labels:
          instance: 'prometheus'

  # 抓取 Frontend 服务指标（function_* 指标）
  - job_name: 'yuanrong-frontend'
    scrape_interval: 10s
    metrics_path: '/metrics'
    static_configs:
      - targets: ['localhost:8888']  # 根据实际服务端口修改
        labels:
          service: 'yuanrong-frontend'
          instance: 'frontend-1'

  # 抓取 FunctionSystem 指标（yr_cluster_* / yr_nodes_* / yr_instance_count）
  # functionsystem 通过 OTLP 或 Prometheus exporter 暴露指标，端口视部署配置而定
  - job_name: 'yuanrong-functionsystem'
    scrape_interval: 15s
    metrics_path: '/metrics'
    static_configs:
      - targets: ['localhost:8889']  # 根据 function_master 实际 metrics 端口修改
        labels:
          service: 'yuanrong-functionsystem'
          instance: 'functionsystem-1'
